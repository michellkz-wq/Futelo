# Futelo — Configuration Nginx optimisée SEO
# À placer dans /etc/nginx/sites-available/futelo

server {
    listen 80;
    server_name futelo.nanocorp.app www.futelo.nanocorp.app;
    return 301 https://futelo.nanocorp.app$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.futelo.nanocorp.app;
    return 301 https://futelo.nanocorp.app$request_uri;
}

server {
    listen 443 ssl http2;
    server_name futelo.nanocorp.app;
    root /var/www/futelo;
    index index.html;

    # SSL (géré par Coolify/Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/futelo.nanocorp.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/futelo.nanocorp.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # === SÉCURITÉ — Headers SEO-safe ===
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # === GZIP — Core Web Vitals ===
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # === ROUTING — URLs avec trailing slash ===
    # Redirige /box → /box/ (canonical URLs stables)
    rewrite ^([^.]*[^/])$ $1/ permanent;

    # === TRY_FILES — HTML statique ===
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # === CACHE — Core Web Vitals LCP ===
    # CSS, JS : cache 1 an (fingerprinted)
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fonts : cache 1 an
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # Images : cache 30 jours
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # XML Sitemaps : pas de cache (mis à jour souvent)
    location ~* \.xml$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store";
        add_header Content-Type "application/xml; charset=utf-8";
    }

    # robots.txt et llms.txt : cache court
    location = /robots.txt {
        expires 1d;
        access_log off;
    }
    location = /llms.txt {
        expires 1d;
        add_header Content-Type "text/plain; charset=utf-8";
        access_log off;
    }

    # HTML : cache court (offres changent quotidiennement)
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # === ERREURS ===
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
